services:
  # ==========================================
  # 1. NODE.JS BACKEND (Web Service)
  # ==========================================
  - type: web
    name: ngo-lms-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false       # Paste your Neon connection string in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false       # Paste your frontend Render URL after the static site is deployed

  # ==========================================
  # 2. REACT FRONTEND (Static Site)
  # ==========================================
  - type: web
    name: ngo-lms-client
    runtime: static
    region: frankfurt
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ngo-lms-api
          envVarKey: RENDER_EXTERNAL_URL
